<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cosmo Colony</title>
      <script type="module" crossorigin src="/Cosmo-Colony/assets/index-DhX0eOWO.js"></script>
      <link rel="stylesheet" crossorigin href="/Cosmo-Colony/assets/index-DUqb3JA9.css">
    </head>
    <body>
        <div id="entryScreen" class="entry">
            <h1>Cosmo Colony!</h1>
            <div class="config-section">
                <div class="config-row">
                    <label for="humanPlayersToggle">Play as Human:</label>
                    <input type="checkbox" id="humanPlayersToggle" checked />
                </div>
                <div class="config-row">
                    <label for="aiPlayers">AI Players:</label>
                    <input type="number" id="aiPlayers" value="3" min="0" max="9" />
                </div>
            </div>
            <div class="validation-error" id="validationError"></div>
            <h2>Select a Map</h2>
            <div id="mapPickerContainer" class="map-picker-container"></div>
            <div id="mapPreviewTooltip" class="map-preview-tooltip" style="display: none;">
                <svg id="previewSvg" viewBox="0 0 400 300"></svg>
            </div>
            <button id="startButton" disabled>Start Game</button>
        </div>
        <div id="gameContainer" style="display: none">
            <!-- Your game content goes here -->
        </div>
        <div id="gameOverScreen" class="end">
            <h1>Game Over!</h1>
            <button id="restartButton">Play Again</button>
            <!-- Add any additional content for the game over screen here -->
        </div>

    </body>
</html>
